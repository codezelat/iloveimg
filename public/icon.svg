<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="112" fill="url(#bgGradient)"/>
  
  <!-- Inner circle/highlight -->
  <circle cx="256" cy="256" r="180" fill="url(#innerGradient)" opacity="0.3"/>
  
  <!-- Image icon: mountains and sun -->
  <g fill="white">
    <!-- Sun -->
    <circle cx="320" cy="160" r="48"/>
    
    <!-- Mountain peaks (image icon representation) -->
    <path d="M96 384 L192 224 L256 320 L320 240 L416 384 Z"/>
    
    <!-- Smaller decorative element (corner fold) -->
    <path d="M352 128 L384 128 L384 160 Z" opacity="0.4"/>
  </g>
  
  <!-- Sparkle/effect decorations -->
  <g fill="white" opacity="0.6">
    <circle cx="128" cy="192" r="12"/>
    <circle cx="384" cy="320" r="8"/>
    <circle cx="160" cy="320" r="6"/>
  </g>
</svg>
